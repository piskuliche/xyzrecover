name: Release

# Trusted Publishing (OIDC) — no API tokens stored anywhere.
#
# Usage:
#   1. Dry run: Actions tab -> "Release" -> "Run workflow" -> target = testpypi
#   2. Real release: publish a GitHub Release on tag v0.1.0 -> goes to PyPI
#
# One-time setup (web UI, cannot be scripted):
#   - https://test.pypi.org/manage/account/publishing/  add a pending publisher:
#       project name = xyzrecover, owner = piskuliche, repo = xyzrecover,
#       workflow = release.yml, environment = testpypi
#   - https://pypi.org/manage/account/publishing/  same but environment = pypi

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and check
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
